<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>DAMINI+ Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --bg: #06080f;
  --bg2: #0a0d18;
  --bg3: #0f1220;
  --surface: #111827;
  --surface2: #1a2235;
  --surface3: #1f2840;
  --border: rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.1);
  --border3: rgba(255,255,255,0.15);

  --cyan: #22d3ee;
  --cyan-dim: rgba(34,211,238,0.12);
  --cyan-glow: rgba(34,211,238,0.25);
  --violet: #a78bfa;
  --violet-dim: rgba(167,139,250,0.1);
  --emerald: #34d399;
  --emerald-dim: rgba(52,211,153,0.1);
  --amber: #fbbf24;
  --amber-dim: rgba(251,191,36,0.1);
  --rose: #fb7185;
  --rose-dim: rgba(251,113,133,0.1);
  --sky: #38bdf8;

  --text: #f1f5f9;
  --text2: #94a3b8;
  --text3: #475569;
  --text4: #2d3a4f;

  --font: 'Outfit', sans-serif;
  --mono: 'JetBrains Mono', monospace;
  --sidebar-w: 240px;
  --topbar-h: 60px;
  --radius: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
}

html { scroll-behavior: smooth; }
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; line-height: 1.5; }

/* Scrollbar */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 99px; }

/* LAYOUT */
#app { display: flex; min-height: 100vh; }

/* ────────── SIDEBAR ────────── */
#sidebar {
  width: var(--sidebar-w); min-height: 100vh;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  position: fixed; top: 0; left: 0; z-index: 100;
}

.sidebar-brand {
  padding: 24px 20px 20px;
  border-bottom: 1px solid var(--border);
}
.brand-mark {
  display: flex; align-items: center; gap: 10px;
}
.brand-icon {
  width: 34px; height: 34px; border-radius: 10px;
  background: linear-gradient(135deg, var(--cyan), #818cf8);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700; color: #fff; font-family: var(--mono);
  flex-shrink: 0; letter-spacing: -1px;
}
.brand-name {
  font-size: 17px; font-weight: 700; letter-spacing: -0.5px; color: var(--text);
}
.brand-sub {
  font-size: 10px; color: var(--text3); font-weight: 400; margin-top: 1px;
  letter-spacing: 1.5px; text-transform: uppercase;
}

.sidebar-nav { flex: 1; padding: 16px 12px; overflow-y: auto; }
.nav-section {
  font-size: 9px; font-weight: 600; color: var(--text4);
  text-transform: uppercase; letter-spacing: 2px;
  padding: 14px 8px 6px;
}
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px; border-radius: 10px;
  cursor: pointer; font-size: 13.5px; font-weight: 500;
  color: var(--text3); transition: all 0.2s;
  margin-bottom: 1px; border: 1px solid transparent;
  position: relative; overflow: hidden;
}
.nav-item::before {
  content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%);
  width: 3px; height: 0; background: var(--cyan);
  border-radius: 0 2px 2px 0; transition: height 0.2s;
}
.nav-item:hover { background: var(--surface); color: var(--text); }
.nav-item.active {
  background: linear-gradient(90deg, rgba(34,211,238,0.08), transparent);
  color: var(--cyan); border-color: rgba(34,211,238,0.12);
}
.nav-item.active::before { height: 60%; }
.nav-icon { font-size: 16px; width: 20px; text-align: center; }

.sidebar-footer {
  padding: 16px 12px;
  border-top: 1px solid var(--border);
}
.admin-card {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border-radius: 10px;
  background: var(--surface); margin-bottom: 8px;
}
.admin-ava {
  width: 32px; height: 32px; border-radius: 8px;
  background: linear-gradient(135deg, var(--violet), var(--cyan));
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0;
}
.admin-name { font-size: 13px; font-weight: 600; color: var(--text); }
.admin-role { font-size: 10px; color: var(--text3); }
.logout-btn {
  display: flex; align-items: center; gap: 8px;
  width: 100%; padding: 9px 12px;
  border-radius: 10px; border: none; background: none;
  color: var(--rose); font-size: 13px; font-weight: 500;
  cursor: pointer; font-family: var(--font); transition: background 0.15s;
}
.logout-btn:hover { background: var(--rose-dim); }

/* ────────── MAIN ────────── */
#main { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; }

/* ────────── TOPBAR ────────── */
#topbar {
  height: var(--topbar-h); position: sticky; top: 0; z-index: 50;
  background: rgba(6,8,15,0.85); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 28px; display: flex; align-items: center; justify-content: space-between;
}
.topbar-left { display: flex; align-items: center; gap: 12px; }
.page-title { font-size: 16px; font-weight: 600; color: var(--text); }
.topbar-crumb { font-size: 12px; color: var(--text3); }
.topbar-right { display: flex; align-items: center; gap: 10px; }
.topbar-time {
  font-family: var(--mono); font-size: 12px; color: var(--text3);
  background: var(--surface); padding: 5px 10px; border-radius: 8px;
  border: 1px solid var(--border);
}
.status-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--emerald);
  box-shadow: 0 0 8px var(--emerald);
  animation: pulse-dot 2s infinite;
}
@keyframes pulse-dot {
  0%,100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* ────────── CONTENT ────────── */
#content { padding: 28px; flex: 1; }

/* ────────── GLASS CARD ────────── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}
.card-header {
  padding: 18px 22px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.card-title { font-size: 14px; font-weight: 600; color: var(--text); }
.card-body { padding: 22px; }

/* ────────── STATS GRID ────────── */
.stats-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; margin-bottom: 24px; }
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
  position: relative; overflow: hidden;
  transition: border-color 0.2s;
}
.stat-card:hover { border-color: var(--border2); }
.stat-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--cyan-glow), transparent);
}
.stat-accent {
  width: 36px; height: 36px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px; margin-bottom: 14px;
}
.stat-accent.blue { background: var(--cyan-dim); }
.stat-accent.green { background: var(--emerald-dim); }
.stat-accent.amber { background: var(--amber-dim); }
.stat-accent.violet { background: var(--violet-dim); }
.stat-accent.rose { background: var(--rose-dim); }
.stat-label { font-size: 11px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: 0.8px; }
.stat-value { font-size: 28px; font-weight: 700; font-family: var(--mono); margin: 6px 0 4px; line-height: 1; }
.stat-value.blue { color: var(--cyan); }
.stat-value.green { color: var(--emerald); }
.stat-value.amber { color: var(--amber); }
.stat-value.violet { color: var(--violet); }
.stat-sub { font-size: 11px; color: var(--text3); }

/* ────────── TABLE ────────── */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
th {
  font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 1px; color: var(--text3);
  padding: 11px 18px; text-align: left;
  background: var(--bg3); border-bottom: 1px solid var(--border);
}
td { padding: 13px 18px; font-size: 13.5px; border-bottom: 1px solid var(--border); color: var(--text2); }
tr:last-child td { border-bottom: none; }
tbody tr { transition: background 0.1s; }
tbody tr:hover td { background: rgba(255,255,255,0.02); color: var(--text); }

/* ────────── BADGES ────────── */
.badge {
  display: inline-flex; align-items: center; padding: 3px 9px;
  border-radius: 99px; font-size: 11px; font-weight: 600;
  letter-spacing: 0.2px;
}
.badge-cyan { background: var(--cyan-dim); color: var(--cyan); }
.badge-green { background: var(--emerald-dim); color: var(--emerald); }
.badge-rose { background: var(--rose-dim); color: var(--rose); }
.badge-amber { background: var(--amber-dim); color: var(--amber); }
.badge-violet { background: var(--violet-dim); color: var(--violet); }

/* ────────── BUTTONS ────────── */
.btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 9px 16px; border-radius: 10px;
  font-size: 13px; font-weight: 600; cursor: pointer;
  border: none; font-family: var(--font); transition: all 0.15s;
  letter-spacing: 0.1px;
}
.btn-primary {
  background: var(--cyan); color: #06080f;
}
.btn-primary:hover { background: #67e8f9; transform: translateY(-1px); }
.btn-outline {
  background: transparent; border: 1px solid var(--border2);
  color: var(--text2);
}
.btn-outline:hover { border-color: var(--border3); color: var(--text); background: var(--surface2); }
.btn-danger {
  background: transparent; border: 1px solid rgba(251,113,133,0.25);
  color: var(--rose);
}
.btn-danger:hover { background: var(--rose-dim); }
.btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 8px; }
.btn-xs { padding: 4px 9px; font-size: 11px; border-radius: 6px; }

/* ────────── FORM ────────── */
.form-grid { display: grid; gap: 16px; }
.form-grid-2 { grid-template-columns: 1fr 1fr; }
.form-group { display: flex; flex-direction: column; gap: 7px; }
label { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.8px; }
input, select, textarea {
  background: var(--bg3); border: 1px solid var(--border2);
  border-radius: 10px; padding: 10px 14px;
  font-size: 13.5px; color: var(--text); font-family: var(--font);
  outline: none; transition: all 0.15s; width: 100%;
}
input:focus, select:focus, textarea:focus {
  border-color: var(--cyan); background: var(--bg2);
  box-shadow: 0 0 0 3px rgba(34,211,238,0.08);
}
input::placeholder { color: var(--text4); }
select option { background: var(--surface); }
textarea { resize: vertical; min-height: 80px; }

/* ────────── MODAL ────────── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(8px);
  z-index: 200; display: flex;
  align-items: center; justify-content: center; padding: 20px;
}
.modal {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: var(--radius-xl);
  width: 100%; max-width: 520px;
  max-height: 88vh; overflow-y: auto;
  animation: modal-in 0.2s ease;
}
@keyframes modal-in {
  from { opacity: 0; transform: scale(0.96) translateY(8px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}
.modal-header {
  padding: 20px 24px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.modal-title { font-size: 15px; font-weight: 700; color: var(--text); }
.modal-close {
  width: 28px; height: 28px; border-radius: 8px;
  background: var(--surface2); border: none; color: var(--text2);
  cursor: pointer; font-size: 16px; display: flex;
  align-items: center; justify-content: center; transition: all 0.15s;
}
.modal-close:hover { background: var(--rose-dim); color: var(--rose); }
.modal-body { padding: 24px; }
.modal-footer {
  padding: 18px 24px; border-top: 1px solid var(--border);
  display: flex; gap: 10px; justify-content: flex-end;
}

/* ────────── SEARCH BAR ────────── */
.search-bar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
.search-wrap { position: relative; flex: 1; min-width: 200px; }
.search-wrap input { padding-left: 38px; }
.search-wrap::before {
  content: '🔍'; position: absolute; left: 12px; top: 50%;
  transform: translateY(-50%); font-size: 13px; z-index: 1;
}

/* ────────── LOGIN PAGE ────────── */
#login-page {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; background: var(--bg);
  background-image:
    radial-gradient(ellipse 60% 50% at 20% 60%, rgba(34,211,238,0.06) 0%, transparent 100%),
    radial-gradient(ellipse 50% 40% at 80% 30%, rgba(167,139,250,0.05) 0%, transparent 100%);
}
.login-wrap {
  width: 100%; max-width: 400px; padding: 20px;
}
.login-header { text-align: center; margin-bottom: 36px; }
.login-logo-icon {
  width: 56px; height: 56px; border-radius: 16px;
  background: linear-gradient(135deg, var(--cyan) 0%, #818cf8 100%);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; font-weight: 800; color: #fff;
  font-family: var(--mono); letter-spacing: -2px;
  margin: 0 auto 16px;
}
.login-title {
  font-size: 28px; font-weight: 700; color: var(--text); letter-spacing: -1px;
}
.login-sub { font-size: 13px; color: var(--text3); margin-top: 4px; }
.login-card {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius-xl);
  padding: 32px;
  position: relative; overflow: hidden;
}
.login-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--cyan), var(--violet), transparent);
}
.login-group { margin-bottom: 20px; }
.login-group label {
  display: block; font-size: 11px; font-weight: 600;
  color: var(--text3); margin-bottom: 8px;
  text-transform: uppercase; letter-spacing: 1px;
}
.otp-input {
  font-size: 28px !important; letter-spacing: 12px !important;
  text-align: center !important; font-family: var(--mono) !important;
}
.otp-info {
  font-size: 12px; color: var(--text3); line-height: 1.6; margin-bottom: 20px;
  padding: 12px 14px; background: var(--bg3); border-radius: 10px;
  border: 1px solid var(--border);
}
.otp-info strong { color: var(--cyan); font-weight: 600; }
.login-actions { display: flex; gap: 8px; flex-direction: column; }
.btn-login {
  width: 100%; justify-content: center;
  background: linear-gradient(135deg, var(--cyan), #818cf8);
  color: #fff; font-size: 14px; padding: 13px;
  border-radius: 12px; border: none; cursor: pointer;
  font-family: var(--font); font-weight: 700;
  transition: opacity 0.15s, transform 0.15s;
  letter-spacing: 0.2px;
}
.btn-login:hover { opacity: 0.9; transform: translateY(-1px); }
.btn-login:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.back-link {
  text-align: center; font-size: 12px; color: var(--text3);
  cursor: pointer; padding: 6px; background: none; border: none;
  font-family: var(--font); transition: color 0.15s;
}
.back-link:hover { color: var(--text2); }
.resend-btn {
  text-align: center; font-size: 12px; color: var(--cyan);
  cursor: pointer; padding: 6px; background: none; border: none;
  font-family: var(--font);
}
.resend-btn:disabled { color: var(--text3); cursor: not-allowed; }

/* ────────── TOAST ────────── */
#toast-container {
  position: fixed; bottom: 24px; right: 24px; z-index: 999;
  display: flex; flex-direction: column; gap: 10px;
}
.toast {
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 12px; padding: 14px 18px;
  font-size: 13.5px; display: flex; align-items: center; gap: 10px;
  animation: toast-in 0.3s cubic-bezier(0.34,1.56,0.64,1);
  min-width: 240px; max-width: 320px;
  box-shadow: 0 16px 40px rgba(0,0,0,0.4);
  font-weight: 500;
}
.toast.success { border-left: 3px solid var(--emerald); }
.toast.error { border-left: 3px solid var(--rose); }
@keyframes toast-in {
  from { opacity: 0; transform: translateX(30px) scale(0.9); }
  to { opacity: 1; transform: translateX(0) scale(1); }
}

/* ────────── LOADING ────────── */
.spinner {
  width: 20px; height: 20px; border: 2px solid var(--border2);
  border-top-color: var(--cyan); border-radius: 50%;
  animation: spin 0.6s linear infinite; flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-state {
  display: flex; align-items: center; justify-content: center;
  padding: 60px 20px; gap: 12px; color: var(--text3); font-size: 13px;
}

/* ────────── EMPTY STATE ────────── */
.empty-state { text-align: center; padding: 56px 20px; }
.empty-icon { font-size: 40px; margin-bottom: 14px; opacity: 0.5; }
.empty-title { font-size: 15px; font-weight: 600; color: var(--text2); margin-bottom: 6px; }
.empty-sub { font-size: 13px; color: var(--text3); }

/* ────────── PAGINATION ────────── */
.pagination {
  display: flex; align-items: center; gap: 6px;
  padding: 14px 20px; border-top: 1px solid var(--border);
}
.pg-info { font-size: 12px; color: var(--text3); margin-right: auto; font-family: var(--mono); }
.pg-btn {
  padding: 5px 12px; border-radius: 8px;
  border: 1px solid var(--border2); background: transparent;
  color: var(--text2); cursor: pointer; font-size: 12px;
  font-family: var(--font); font-weight: 500; transition: all 0.15s;
}
.pg-btn:hover, .pg-btn.active { background: var(--cyan); color: #06080f; border-color: var(--cyan); font-weight: 700; }
.pg-btn:disabled { opacity: 0.3; cursor: not-allowed; }

/* ────────── HIERARCHY ────────── */
.h-chapter {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: var(--radius); margin-bottom: 8px; overflow: hidden;
}
.h-chapter-header {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 16px; cursor: pointer; transition: background 0.15s;
}
.h-chapter-header:hover { background: rgba(255,255,255,0.02); }
.h-chapter-header.open { background: rgba(34,211,238,0.04); }
.h-expand { font-size: 10px; color: var(--text3); width: 16px; }
.h-chapter-name { font-size: 13.5px; font-weight: 600; color: var(--text); flex: 1; }
.h-meta { font-size: 11px; color: var(--text3); margin-left: auto; }
.h-chapter-body { border-top: 1px solid var(--border); }
.h-topic {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px 10px 32px; cursor: pointer;
  border-bottom: 1px solid var(--border);
  transition: background 0.15s;
}
.h-topic:last-of-type { border-bottom: none; }
.h-topic:hover { background: rgba(255,255,255,0.015); }
.h-topic.open { background: rgba(167,139,250,0.04); }
.h-topic-name { font-size: 13px; color: var(--text2); flex: 1; }
.h-q-list { border-top: 1px solid var(--border); }
.h-question {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px 10px 48px;
  border-bottom: 1px solid var(--border);
}
.h-question:last-child { border-bottom: none; }
.h-q-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--text4); flex-shrink: 0;
}
.h-q-text { font-size: 12px; color: var(--text3); flex: 1; line-height: 1.4; }

/* ────────── STEPS LIST ────────── */
.steps-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
.steps-list li { display: flex; align-items: flex-start; gap: 10px; font-size: 13px; color: var(--text2); }
.step-num {
  width: 22px; height: 22px; border-radius: 6px;
  background: var(--cyan-dim); color: var(--cyan);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; flex-shrink: 0; margin-top: 1px;
  font-family: var(--mono);
}

/* ────────── TABS ────────── */
.tabs { display: flex; gap: 2px; background: var(--bg3); border-radius: 10px; padding: 3px; margin-bottom: 20px; border: 1px solid var(--border); }
.tab { flex: 1; text-align: center; padding: 8px; border-radius: 8px; font-size: 12.5px; font-weight: 600; cursor: pointer; color: var(--text3); transition: all 0.15s; }
.tab.active { background: var(--surface); color: var(--text); }

/* ────────── MISC ────────── */
.hidden { display: none !important; }
.flex { display: flex; }
.items-center { align-items: center; }
.gap-2 { gap: 8px; }
.gap-3 { gap: 12px; }
.ml-auto { margin-left: auto; }
.text-mono { font-family: var(--mono); }
strong { color: var(--text); font-weight: 600; }

/* ────────── SECTION HEADER ────────── */
.section-hdr {

<script>
const API_BASE = window.location.port === '5500' ? 'http://localhost:5000/api/v1' : '/api/v1';
const API = API_BASE;
let token = localStorage.getItem('dp_token');
let adminData = JSON.parse(localStorage.getItem('dp_admin') || '{}');
let currentPage = 'dashboard';
let chaptersData = [], topicsData = {}, questionsData = {};
let expandedChapters = new Set(), expandedTopics = new Set();
let boardsData = [], langsData = [], classesData = [], subjectsData = [], subsData = [];
let usersPage = 1, purchasePage = 1;

async function api(method, path, body = null) {
  const isFormData = body instanceof FormData;
  const opts = { method, headers: { 'Accept': 'application/json' } };
  if (!isFormData) opts.headers['Content-Type'] = 'application/json';
  if (token) opts.headers['Authorization'] = 'Bearer ' + token;
  if (body) opts.body = isFormData ? body : JSON.stringify(body);
  const res = await fetch(API + path, opts);
  return res.json();
}

function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span>${type === 'success' ? '✅' : '❌'}</span><span>${msg}</span>`;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

function showModal(title, bodyHTML, onSave) {
  closeModal();
  const el = document.createElement('div');
  el.className = 'modal-overlay';
  el.id = 'modal-overlay';
  el.innerHTML = `
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <div class="modal-title">${title}</div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">${bodyHTML}</div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" id="modal-save-btn" onclick="modalSave()">Save Changes</button>
      </div>
    </div>`;
  el.onclick = closeModal;
  document.body.appendChild(el);
  window._modalOnSave = onSave;
}

function closeModal() { const e = document.getElementById('modal-overlay'); if (e) e.remove(); }

async function modalSave() {
  const btn = document.getElementById('modal-save-btn');
  btn.disabled = true; btn.textContent = 'Saving...';
  try { await window._modalOnSave(); }
  catch(e) { toast(e.message, 'error'); btn.disabled = false; btn.textContent = 'Save Changes'; }
}

function showConfirm(msg, onConfirm) {
  const el = document.createElement('div');
  el.className = 'modal-overlay'; el.id = 'modal-overlay';
  el.innerHTML = `
    <div class="modal" style="max-width:380px" onclick="event.stopPropagation()">
      <div class="modal-header"><div class="modal-title">⚠️ Confirm Delete</div></div>
      <div class="modal-body"><p style="font-size:14px;color:var(--text2);line-height:1.6">${msg}</p></div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
        <button class="btn btn-danger" onclick="window._confirmCb()">Delete Permanently</button>
      </div>
    </div>`;
  el.onclick = closeModal;
  document.body.appendChild(el);
  window._confirmCb = async () => { closeModal(); await onConfirm(); };
}

/* ─── AUTH ─── */
let resendInterval = null;

async function handleSendOTP(isResend = false) {
  const email = document.getElementById('login-email').value.trim();
  if (!email) return toast('Email address enter karein', 'error');
  const btn = document.getElementById('send-otp-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Sending OTP...'; }
  try {
    const res = await api('POST', '/auth/send-otp', { email });
    if (!res.status) { toast(res.message || 'OTP send nahi hua', 'error'); if(btn){btn.disabled=false;btn.textContent='Continue with OTP →';} return; }
    toast('OTP aapki email pe bheja gaya ✉️');
    document.getElementById('login-step-1').style.display = 'none';
    document.getElementById('login-step-2').style.display = 'block';
    document.getElementById('otp-sent-to').textContent = email;
    document.getElementById('login-otp').focus();
    startResendTimer();
  } catch(e) { toast('Network error: Backend chal raha hai?', 'error'); if(btn){btn.disabled=false;btn.textContent='Continue with OTP →';} }
}

function startResendTimer() {
  const resendBtn = document.getElementById('resend-otp-btn');
  const timerEl = document.getElementById('resend-timer');
  let seconds = 60;
  resendBtn.disabled = true;
  resendBtn.textContent = `Resend OTP (${seconds}s)`;
  if (resendInterval) clearInterval(resendInterval);
  resendInterval = setInterval(() => {
    seconds--;
    if (timerEl) resendBtn.textContent = `Resend OTP (${seconds}s)`;
    if (seconds <= 0) { clearInterval(resendInterval); resendBtn.disabled = false; resendBtn.textContent = 'Resend OTP'; }
  }, 1000);
}

function backToEmail() {
  document.getElementById('login-step-1').style.display = 'block';
  document.getElementById('login-step-2').style.display = 'none';
  document.getElementById('login-otp').value = '';
  const btn = document.getElementById('send-otp-btn');
  if (btn) { btn.disabled = false; btn.textContent = 'Continue with OTP →'; }
  if (resendInterval) clearInterval(resendInterval);
}

async function handleVerifyOTP() {
  const email = document.getElementById('login-email').value.trim();
  const otp = document.getElementById('login-otp').value.trim();
  if (!otp || otp.length < 6) return toast('6-digit OTP enter karein', 'error');
  const btn = document.getElementById('verify-otp-btn');
  btn.disabled = true; btn.textContent = 'Verifying...';
  const res = await api('POST', '/auth/verify-otp', { email, otp });
  if (!res.status) { toast(res.message || 'Invalid OTP', 'error'); btn.disabled = false; btn.textContent = 'Verify & Sign In ✓'; return; }
  token = res.data.token; adminData = res.data.admin;
  localStorage.setItem('dp_token', token); localStorage.setItem('dp_admin', JSON.stringify(adminData));
  initDashboard();
}

function handleLogout() {
  localStorage.removeItem('dp_token'); localStorage.removeItem('dp_admin'); token = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-page').style.display = 'flex';
}

function initDashboard() {
  document.getElementById('login-page').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  const name = adminData.name || 'Admin';
  document.getElementById('admin-name').textContent = name;
  document.getElementById('admin-avatar').textContent = name[0].toUpperCase();
  updateTime(); setInterval(updateTime, 1000); navigate('dashboard');
}

function updateTime() {
  const el = document.getElementById('topbar-time');
  if (el) el.textContent = new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
}

/* ─── NAVIGATE ─── */
function navigate(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(e => e.classList.remove('active'));
  const active = document.querySelector(`.nav-item[onclick="navigate('${page}')"]`);
  if (active) active.classList.add('active');
  const titles = { dashboard:'Dashboard', boards:'Boards', languages:'Languages', classes:'Classes', subjects:'Subjects', chapters:'Chapters & Topics', users:'Users', subscriptions:'Subscriptions', purchases:'Purchases' };
  document.getElementById('page-title').textContent = titles[page] || page;
  const pages = { dashboard:renderDashboard, boards:renderBoards, languages:renderLanguages, classes:renderClasses, subjects:renderSubjects, chapters:renderChaptersHierarchy, users:renderUsers, subscriptions:renderSubscriptions, purchases:renderPurchases };
  if (pages[page]) pages[page]();
}

function setContent(html) { document.getElementById('content').innerHTML = html; }
function loadingState() { setContent('<div class="loading-state"><div class="spinner"></div><span style="color:var(--text3)">Loading...</span></div>'); }
function formatDate(d) { if (!d) return '—'; return new Date(d).toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' }); }

              <tr>

function openBoardModal(id = null) {
  const b = id ? boardsData.find(x => x._id === id) : null;
  const selectedLanguageIds = getBoardLanguageIds(b);
  const defaultLanguageId = getId(b?.defaultLanguageId) || selectedLanguageIds[0] || '';
  showModal(b ? 'Edit Board' : 'Add Board', `
    <div class="form-grid form-grid-2">
      <div class="form-group"><label>Board Name *</label><input id="f-name" value="${b?.name||''}" placeholder="CBSE" /></div>
      <div class="form-group"><label>Full Name</label><input id="f-fullName" value="${b?.fullName||''}" placeholder="Central Board..." /></div>
      <div class="form-group" style="grid-column:1/-1">
        <label>Supported Languages *</label>
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;margin-top:6px">
          ${langsData.filter(l => l.isActive !== false).map(l => `
            <label style="display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:9px 10px;font-size:13px">
              <input type="checkbox" class="board-language-check" value="${l._id}" ${selectedLanguageIds.includes(l._id) ? 'checked' : ''} onchange="syncDefaultLanguageOptions()" />
              <span>${l.name}${l.code ? ` (${l.code})` : ''}</span>
            </label>`).join('') || '<p style="color:var(--text3);font-size:13px">Create active languages before adding a board.</p>'}
        </div>
      </div>
      <div class="form-group"><label>Default Language *</label><select id="f-defaultLanguageId" data-selected="${defaultLanguageId}"></select></div>
      ${b ? `<div class="form-group"><label>Status</label><select id="f-isActive"><option value="true" ${b.isActive?'selected':''}>Active</option><option value="false" ${!b.isActive?'selected':''}>Inactive</option></select></div>` : ''}
    </div>`, async () => {
    const languageIds = [...document.querySelectorAll('.board-language-check:checked')].map(el => el.value);
    const body = { name: document.getElementById('f-name').value.trim(), fullName: document.getElementById('f-fullName').value.trim(), languageIds, defaultLanguageId: document.getElementById('f-defaultLanguageId').value };
    if (!body.name) throw new Error('Board name is required');
    if (!body.languageIds.length) throw new Error('Select at least one language');
    if (!body.defaultLanguageId) throw new Error('Default language is required');
    if (b) body.isActive = document.getElementById('f-isActive').value === 'true';
    const res = await api(b ? 'PUT' : 'POST', `/boards${b?'/'+b._id:''}`, body);
    if (!res.status) throw new Error(res.message);
    toast(b ? 'Board updated' : 'Board created'); closeModal(); renderBoards();
  });
  syncDefaultLanguageOptions();
}

/* ─── CHAPTERS & TOPICS HIERARCHY ─── */
async function renderChaptersHierarchy() {
  loadingState();
  const [cR, bR, classR, subjectR, langR] = await Promise.all([api('GET', '/chapters'), api('GET', '/boards'), api('GET', '/classes'), api('GET', '/subjects'), api('GET', '/languages')]);
  chaptersData = cR.data || []; boardsData = bR.data || []; classesData = classR.data || []; subjectsData = subjectR.data || []; langsData = langR.data || [];
  expandChaptersByDefault(chaptersData); topicsData = {}; questionsData = {};
  setContent(`
    <div class="section-hdr">
      <h2>Chapters & Topics</h2><span class="cnt">${chaptersData.length}</span>
      <div class="flex gap-2" style="margin-left:auto">
        <select id="filter-board-ch" style="max-width:150px" onchange="onBoardChangeCh()"><option value="">All Boards</option>${boardsData.map(b=>`<option value="${b._id}">${b.name}</option>`).join('')}</select>
        <select id="filter-class-ch" style="max-width:150px" onchange="onClassChangeCh()"><option value="">All Classes</option>${classesData.map(c=>`<option value="${c._id}">${c.name}</option>`).join('')}</select>
        <select id="filter-subject-ch" style="max-width:150px" onchange="filterChaptersCh()"><option value="">All Subjects</option>${subjectsData.map(s=>`<option value="${s._id}">${s.name}</option>`).join('')}</select>
      </div>
      <button class="btn btn-primary btn-sm" onclick="openChapterModal()">+ Add Chapter</button>
    </div>
    <div id="hierarchy-container"></div>`);
  await renderHierarchy();

async function renderHierarchy() {
  const container = document.getElementById('hierarchy-container');
  if (!container) return;
  if (!chaptersData.length) { container.innerHTML = '<div class="empty-state"><div class="empty-icon">📝</div><div class="empty-title">No chapters yet</div><div class="empty-sub">Add your first chapter to get started</div></div>'; return; }
  let html = '';
  for (const ch of chaptersData) {
    const exp = expandedChapters.has(ch._id);
    html += `<div class="h-chapter">
      <div class="h-chapter-header ${exp?'open':''}" onclick="toggleChapterExpand('${ch._id}')">
        <span class="h-expand">${exp?'▼':'▶'}</span>
        <span class="h-chapter-name">${ch.name}</span>
        <span class="h-meta">${ch.boardId?.name||'—'} • ${ch.classId?.name||'—'}</span>
        <div class="flex gap-2" style="margin-left:12px" onclick="event.stopPropagation()">
          <button class="btn btn-outline btn-xs" onclick="openChapterModal('${ch._id}')">Edit</button>
          <button class="btn btn-danger btn-xs" onclick="deleteItem('chapters','${ch._id}',renderChaptersHierarchy)">Delete</button>
        </div>
      </div>`;
    if (exp) { const topicsHtml = await renderTopicsForChapter(ch._id); html += `<div class="h-chapter-body">${topicsHtml}</div>`; }
    html += '</div>';
  }
  container.innerHTML = html;
}

async function renderTopicsForChapter(chapterId) {
  if (!topicsData[chapterId]) { const r = await api('GET', `/topics?chapterId=${chapterId}`); topicsData[chapterId] = r.data||[]; }
  const topics = topicsData[chapterId];
  if (!topics.length) return `<div style="padding:14px 16px 14px 32px;display:flex;align-items:center;gap:12px;color:var(--text3);font-size:13px">No topics yet<button class="btn btn-primary btn-xs" onclick="openTopicModal('${chapterId}')">+ Add Topic</button></div>`;
  let html = '';
  for (const t of topics) {
    const exp = expandedTopics.has(t._id);
    html += `<div>
      <div class="h-topic ${exp?'open':''}" onclick="toggleTopicExpand('${t._id}')">
        <span class="h-expand" style="font-size:9px">${exp?'▼':'▶'}</span>
        <span class="h-topic-name">${t.name}</span>
        <div class="flex gap-2" onclick="event.stopPropagation()">
          <button class="btn btn-outline btn-xs" onclick="openTopicModal('${chapterId}','${t._id}')">Edit</button>
          <button class="btn btn-danger btn-xs" onclick="deleteItem('topics','${t._id}',()=>reloadTopics('${chapterId}'))">Del</button>
        </div>
      </div>`;
    if (exp) { const qHtml = await renderQuestionsForTopic(t._id); html += `<div class="h-q-list">${qHtml}</div>`; }
    html += '</div>';
  }
  html += `<div style="padding:10px 16px 10px 32px"><button class="btn btn-primary btn-xs" onclick="openTopicModal('${chapterId}')">+ Add Topic</button></div>`;
  return html;
}

async function renderQuestionsForTopic(topicId) {
  if (!questionsData[topicId]) { const r = await api('GET', `/questions?topicId=${topicId}`); questionsData[topicId] = r.data?.questions||[]; }
  const questions = questionsData[topicId];
  if (!questions.length) return `<div style="padding:12px 14px 12px 48px;display:flex;align-items:center;gap:12px;color:var(--text3);font-size:12px">No questions yet<button class="btn btn-primary btn-xs" onclick="openQuestionModal('${topicId}')">+ Add Question</button></div>`;
  let html = '';
  for (const q of questions) {
    html += `<div class="h-question">
      <div class="h-q-dot"></div>
      <div class="h-q-text">${q.question.substring(0,70)}${q.question.length>70?'...':''}</div>
      <div class="flex gap-2">
        <button class="btn btn-outline btn-xs" onclick="viewQuestion('${q._id}')">View</button>
        <button class="btn btn-outline btn-xs" onclick="openQuestionModal('${topicId}','${q._id}')">Edit</button>
        <button class="btn btn-danger btn-xs" onclick="deleteItem('questions','${q._id}',()=>reloadQuestions('${topicId}'))">Del</button>
      </div>
    </div>`;
  }
  html += `<div style="padding:10px 14px 10px 48px"><button class="btn btn-primary btn-xs" onclick="openQuestionModal('${topicId}')">+ Add Question</button></div>`;
  return html;
}

function toggleChapterExpand(id) { expandedChapters.has(id)?expandedChapters.delete(id):expandedChapters.add(id); renderHierarchy(); }
function toggleTopicExpand(id) { expandedTopics.has(id)?expandedTopics.delete(id):expandedTopics.add(id); renderHierarchy(); }
async function reloadTopics(chapterId) { topicsData[chapterId]=undefined; renderHierarchy(); }
async function reloadQuestions(topicId) { questionsData[topicId]=undefined; renderHierarchy(); }

async function filterChaptersCh() {
  const b = document.getElementById('filter-board-ch')?.value||'', c = document.getElementById('filter-class-ch')?.value||'', s = document.getElementById('filter-subject-ch')?.value||'';

async function openQuestionModal(topicId, questionId = null) {
  const questions = questionsData[topicId]||[], q = questionId ? questions.find(x=>x._id===questionId) : null;

  if (!boardId && !q) {
    for (const cid of Object.keys(topicsData)) {
      const topic = (topicsData[cid]||[]).find(t=>t._id===topicId);
      if (topic) { const ch=chaptersData.find(c=>c._id===cid); if(ch){boardId=ch.boardId?._id||ch.boardId;classId=ch.classId?._id||ch.classId;subjectId=ch.subjectId?._id||ch.subjectId;} break; }
    }
  }
  boardId = getId(boardId);
  classId = getId(classId);
  subjectId = getId(subjectId);
  const boardLanguages = getContentLanguagesBySubjectId(subjectId, boardId);
  if (!boardLanguages.length) return toast('Subject language is not configured','error');
  showModal(q?'Edit Question':'Add Question', `
    <div class="form-grid">
      <div class="form-group"><label>Difficulty</label>
        <select id="f-difficulty"><option value="easy" ${q?.difficulty==='easy'?'selected':''}>Easy</option><option value="medium" ${!q||q?.difficulty==='medium'?'selected':''}>Medium</option><option value="hard" ${q?.difficulty==='hard'?'selected':''}>Hard</option></select>
      </div>
      <div style="grid-column:1/-1">${renderTranslationInputs(boardLanguages, q?.translations, [
        { key: 'question', label: 'Question', type: 'textarea', rows: 3, required: true },
        { key: 'answer', label: 'Answer', type: 'textarea', rows: 2, required: true },
        { key: 'steps', label: 'Steps to Solve', type: 'textarea', rows: 4, placeholder: 'One step per line' }
      ])}</div>
    </div>`, async () => {
    const body = { topicId, difficulty:document.getElementById('f-difficulty').value, translations: collectTranslations(boardLanguages, ['question', 'answer', 'steps'], ['steps']), boardId:q?getId(q.boardId):boardId, classId:q?getId(q.classId):classId, subjectId:q?getId(q.subjectId):subjectId };
    const res = await api(q?'PUT':'POST', `/questions${q?'/'+q._id:''}`, body);
    if (!res.status) throw new Error(res.message);
    toast(q?'Question updated':'Question created'); closeModal(); questionsData[topicId]=undefined; renderChaptersHierarchy();
  });
}

function viewQuestion(id) {
  let question = null;
  for (const tid in questionsData) { const q = questionsData[tid].find(x=>x._id===id); if(q){question=q;break;} }
  if (!question) return;
  const diffColor = question.difficulty==='easy'?'badge-green':question.difficulty==='hard'?'badge-rose':'badge-amber';
  showModal('Question Details', `
    <div style="display:flex;flex-direction:column;gap:16px">
      ${renderQuestionTranslationDetails(question)}
      <div class="form-group"><label>Question</label><div style="background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px;font-size:13.5px;line-height:1.6">${question.question}</div></div>
      <div class="form-group"><label>Answer</label><div style="background:rgba(52,211,153,0.07);border:1px solid rgba(52,211,153,0.2);border-radius:10px;padding:14px;font-size:13.5px;color:var(--emerald)">${question.answer}</div></div>
      ${question.steps?.length?`<div class="form-group"><label>Steps</label><ul class="steps-list" style="margin-top:8px">${question.steps.map((s,i)=>`<li><div class="step-num">${i+1}</div><span>${s}</span></li>`).join('')}</ul></div>`:''}
      <div><label>Difficulty</label><div style="margin-top:8px"><span class="badge ${diffColor}">${question.difficulty}</span></div></div>
    </div>`, () => closeModal());
  document.getElementById('modal-save-btn').textContent = 'Close';
  document.getElementById('modal-save-btn').onclick = closeModal;
}

function renderQuestionTranslationDetails(question) {
  if (!question.translations?.length) return '';
  return question.translations.map(t => {
    const language = typeof t.languageId === 'object' ? t.languageId.name : (langsData.find(l => l._id === getId(t.languageId))?.name || 'Language');
    const steps = t.steps?.length ? `<ul class="steps-list" style="margin-top:8px">${t.steps.map((s,i)=>`<li><div class="step-num">${i+1}</div><span>${s}</span></li>`).join('')}</ul>` : '<p style="color:var(--text3);font-size:13px">No steps provided</p>';
    return `<div style="border:1px solid var(--border);border-radius:10px;padding:12px;background:var(--bg3)">
      <div style="font-size:12px;font-weight:700;color:var(--cyan);margin-bottom:10px">${language}</div>
      <div class="form-group"><label>Question</label><div style="padding:10px;border-radius:8px;background:var(--surface2)">${t.question || '—'}</div></div>
      <div class="form-group"><label>Answer</label><div style="padding:10px;border-radius:8px;background:rgba(52,211,153,0.07);color:var(--emerald)">${t.answer || '—'}</div></div>

  }).join('');
}

async function deleteItem(resource, id, onSuccess) {
  showConfirm('Are you sure? This action cannot be undone.', async () => {
    const res = await api('DELETE', `/${resource}/${id}`);
    if (!res.status) return toast(res.message,'error');
    toast('Deleted successfully'); if (onSuccess) onSuccess();
  });
}

function getId(value) {
  return value?._id || value || '';
}

function expandChaptersByDefault(chapters = []) {
  expandedChapters = new Set((chapters || []).map(chapter => chapter._id));
}

function escapeHtml(value = '') {
  return String(value)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function getBoardLanguages(board) {
  return (board?.languageIds || []).map(language => {
    if (typeof language === 'string') return langsData.find(l => l._id === language) || { _id: language, name: 'Language' };
    return language;
  }).filter(Boolean);
}

function getBoardLanguageIds(board) {
  return getBoardLanguages(board).map(l => l._id);
}

function getBoardLanguagesById(boardId) {
  const board = boardsData.find(b => b._id === getId(boardId));
  return getBoardLanguages(board);
}

function mergeById(current, incoming) {
  const map = new Map((current || []).map(item => [item._id, item]));
  (incoming || []).forEach(item => map.set(item._id, item));
  return [...map.values()];
}

function getContentLanguagesBySubjectId(subjectId, boardId = '') {
  const subject = subjectsData.find(s => s._id === getId(subjectId));
  const languageIds = getSubjectLanguageIds(subject);
  if (languageIds.length) {
    return languageIds.map(languageId => {
      const populated = (subject.languageIds || []).find(l => getId(l) === languageId);
      return typeof populated === 'object' ? populated : langsData.find(l => l._id === languageId) || { _id: languageId, name: 'Subject Language' };
    });
  }
  return boardId ? getBoardLanguagesById(boardId) : [];
}

function getSubjectLanguageIds(subject) {
  const ids = (subject?.languageIds || []).map(getId).filter(Boolean);
  const legacyId = getId(subject?.languageId);
  if (legacyId && !ids.includes(legacyId)) ids.push(legacyId);
  return ids;
}

function renderSubjectLanguageCheckboxes(boardId, selectedIds = []) {
  const languages = getBoardLanguagesById(boardId);
  if (!languages.length) {
    return '<div class="empty-state" style="padding:14px"><div class="empty-sub">Select a board with configured languages first.</div></div>';
  }
  return `
    <div class="form-group">
      <label>Subject Languages *</label>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;margin-top:6px">
        ${languages.map(l => `
          <label style="display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:9px 10px;font-size:13px">
            <input type="checkbox" class="subject-language-check" value="${l._id}" ${selectedIds.includes(l._id) ? 'checked' : ''} />
            <span>${l.name}${l.code ? ` (${l.code})` : ''}</span>
          </label>`).join('')}
      </div>
    </div>`;
}

function refreshSubjectLanguageCheckboxes(boardId) {
  const container = document.getElementById('subject-language-fields');
  if (!container) return;
  container.innerHTML = renderSubjectLanguageCheckboxes(boardId, []);
}

function renderLanguageBadges(languages = []) {
  const list = languages.map(language => typeof language === 'string' ? langsData.find(l => l._id === language) : language).filter(Boolean);
  return list.length ? list.map(l => `<span class="badge badge-cyan" style="margin:2px">${l.name}</span>`).join('') : '—';
}

function syncDefaultLanguageOptions() {
  const select = document.getElementById('f-defaultLanguageId');
  if (!select) return;
  const selected = select.value || select.dataset.selected || '';
  const checkedIds = [...document.querySelectorAll('.board-language-check:checked')].map(el => el.value);
  select.innerHTML = '<option value="">Select Default</option>' + checkedIds.map(id => {
    const lang = langsData.find(l => l._id === id);
    return `<option value="${id}" ${id === selected ? 'selected' : ''}>${lang?.name || id}</option>`;
  }).join('');
  if (!select.value && checkedIds.length) select.value = checkedIds[0];
  select.dataset.selected = select.value;
}

function translationForLanguage(translations = [], languageId) {
  return (translations || []).find(t => getId(t.languageId) === languageId) || {};
}

function renderTranslationInputs(languages, translations, fields) {
  if (!languages.length) {
    return '<div class="empty-state" style="padding:14px"><div class="empty-sub">Select a board with configured languages first.</div></div>';
  }
  return languages.map(lang => `
    <div style="border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:12px;background:var(--bg3)">
      <div style="font-size:12px;font-weight:600;color:var(--cyan);margin-bottom:10px">${lang.name}${lang.code ? ` (${lang.code})` : ''}</div>
      <div style="display:grid;grid-template-columns:1fr;gap:10px">
        ${fields.map(field => {
          const existing = translationForLanguage(translations, lang._id);
          const rawValue = Array.isArray(existing[field.key]) ? existing[field.key].join('\n') : existing[field.key] || '';
          const id = `tr-${lang._id}-${field.key}`;
          const label = `${field.label}${field.required ? ' *' : ''}`;
          if (field.type === 'textarea') {
            return `<div class="form-group"><label>${label}</label><textarea id="${id}" rows="${field.rows || 2}" placeholder="${escapeHtml(field.placeholder || '')}">${escapeHtml(rawValue)}</textarea></div>`;
          }
          return `<div class="form-group"><label>${label}</label><input id="${id}" value="${escapeHtml(rawValue)}" /></div>`;
        }).join('')}
      </div>
    </div>`).join('');
}

function collectTranslations(languages, fields, lineArrayFields = []) {
  if (!languages.length) throw new Error('Selected board has no configured languages');
  return languages.map(lang => {
    const translation = { languageId: lang._id };
    for (const field of fields) {
      const el = document.getElementById(`tr-${lang._id}-${field}`);
      const value = el ? el.value.trim() : '';
      translation[field] = lineArrayFields.includes(field) ? value.split('\n').map(s => s.trim()).filter(Boolean) : value;
    }
    if (!translation.name && fields.includes('name')) throw new Error(`Name is required for ${lang.name}`);
    if (!translation.question && fields.includes('question')) throw new Error(`Question is required for ${lang.name}`);
    if (!translation.answer && fields.includes('answer')) throw new Error(`Answer is required for ${lang.name}`);
    return translation;
  });
}

function refreshChapterTranslationInputs(boardId, subjectId = '') {
  const container = document.getElementById('chapter-translation-fields');
  if (!container) return;
  container.innerHTML = renderTranslationInputs(getContentLanguagesBySubjectId(subjectId, boardId), [], [{ key: 'name', label: 'Chapter Name', type: 'input', required: true }]);
}

/* ─── INIT ─── */
if (token) { initDashboard(); }
else { document.getElementById('login-page').style.display='flex'; document.getElementById('app').style.display='none'; }

document.addEventListener('keydown', e => {
  if (e.key==='Escape') closeModal();
  if (e.key==='Enter' && document.getElementById('login-page').style.display!=='none') {
    const s2 = document.getElementById('login-step-2');
    if (s2 && s2.style.display!=='none') handleVerifyOTP(); else handleSendOTP();
  }
});
</script>
